name: Build EXE (Release Only)

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller eel
        if (Test-Path requirements.txt) {
          pip install -r requirements.txt
        }

    - name: Build EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --name NoMoreAuto --add-data "backend/web;web" --hidden-import eel backend/main.py

    - name: Attach EXE to release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/NoMoreAuto.exe
