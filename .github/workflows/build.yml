name: Build EXE

on:
  push:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller eel
        if (Test-Path requirements.txt) {
          pip install -r requirements.txt
        }

    - name: Build EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --name NoMoreAuto --add-data "web;web" --hidden-import eel main.py

    - name: Upload artifact (for pushes)
      uses: actions/upload-artifact@v4
      with:
        name: NoMoreAuto-exe
        path: dist/NoMoreAuto.exe

    - name: Attach EXE to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/NoMoreAuto.exe
